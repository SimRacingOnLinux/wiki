name: Check formatting

on:
  pull_request:
  workflow_call:

jobs:
  treefmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Check formatting
        run: nix fmt -- --fail-on-change
